name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Verify Strict Policy
        run: |
          cargo run -p lan -- check --print-policy --json > policy.json
          python3 - <<'PY'
          import json
          with open("policy.json", "r", encoding="utf-8") as handle:
              policy = json.load(handle)
          assert policy["strict_mode"] is True
          assert policy["solver"] == "new"
          assert policy["exposes_batch_queue"] is False
          PY

      - name: Run Smoke
        run: cargo run -p xtask -- smoke

      - name: Latency Benchmark
        if: matrix.os == 'ubuntu-latest'
        run: ./scripts/bench-latency.sh

  release-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Document
        run: cargo doc -p luau-analyze --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Package Crate
        run: |
          rm -rf target/package/luau-analyze-*
          cargo package -p luau-analyze

      - name: Package Contents List
        run: |
          cargo package --list -p luau-analyze | tee /tmp/luau-analyze-package.txt
          grep -Fx 'LICENSE' /tmp/luau-analyze-package.txt

      - name: Test Packaged Tarball
        run: |
          crate_path="$(find target/package -maxdepth 1 -name 'luau-analyze-*.crate' -print -quit)"
          test -n "$crate_path"
          unpack_dir="$RUNNER_TEMP/luau-analyze-package"
          rm -rf "$unpack_dir"
          mkdir -p "$unpack_dir"
          tar -xzf "$crate_path" -C "$unpack_dir"
          package_dir="$(find "$unpack_dir" -mindepth 1 -maxdepth 1 -type d -print -quit)"
          test -n "$package_dir"
          cargo test --manifest-path "$package_dir/Cargo.toml" --tests --locked

      - name: Dry Run Publish
        run: cargo publish --dry-run -p luau-analyze
  sanitizers:
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
      CFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer
      CXXFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer
      RUSTFLAGS: -C link-arg=-fsanitize=address -C link-arg=-fsanitize=undefined -C link-arg=-fno-omit-frame-pointer
      ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build + Test (Sanitizers)
        run: cargo test -p luau-analyze --tests
